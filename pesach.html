<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">

<body>

    <h1>🍷 פסח 2026: סמלים ושאלות</h1>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
